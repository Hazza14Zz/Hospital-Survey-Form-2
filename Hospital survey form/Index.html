
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Survey Form</title>
<link rel="stylesheet" href="style.css">
  </head>

  <body>
    <h1 id="title">Hospital Survey</h1>
    <p id="description">Thank you for taking the time to help us improve the platform</p>
    <form id="survey-form" action="https://formspree.io/f/xyknrppg" method="POST">

      <label id="name-label" for="name">Full Name</label>
      <input required type="text" id="name" name="full-name" placeholder="e.g John Williams">
       <label id="email-label" for="email">Email Address</label>
      <input type="email" required id="email" name="email" placeholder="example@gmail.com">
       <label id="number-label" for="age">Age (optional)</label>
      <input type="number" id="number" name="age" min="12" max="70" placeholder="32">
      <p for="dropdown">Which option best describes your current role?</p>
      <select id="dropdown" name="role">
        <option value="" disabled selected>Choose your Role</option>
        <option value="student">Student</option>
        <option value="employee">Employee</option>
        <option value="other">Other</option>
        <option value="prefer-not-to-say">Prefer not to say</option>
        </select>
        <p>To whom you prefer to recommend us?</p>
      <input type="radio" id="friend" name="recommend" value="friend">
        <label for="friend">Friend</label>
        <input type="radio" id="neighbor" name="recommend" value="neighbor">
        <label for="neighbor">My Neighbor</label>
        <input type="radio" id="family" name="recommend" value="family">
        <label for="family">My Family</label>
        <p>What most thing want to be improved?</p>
        <input type="checkbox" id="medical-care" name="improve" value="medical-care">
        <label for="medical-care">Medical Care</label>
        <input type="checkbox" id="building" name="improve" value="building">
        <label for="building">Building</label>
        <input type="checkbox" id="better-nurse-system" name="improve" value="better-nurse-system">
        <label for="better-nurse-system">Better Nurse System</label>
        <p>For any suggestions or comments</p>
        <textarea id="comments" name="comments" placeholder="Write your comments here..." rows="4" cols="40">
</textarea>
<button type="submit" id="submit">Submit</button>

      </form>
  </body>
</html>
